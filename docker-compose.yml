version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: travelflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: travel_app
    ports:
      - "5433:5432"  # 5433 on host to avoid conflict with local postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:password@db:5432/travel_app?schema=public
      JWT_SECRET: ${JWT_SECRET:-supersecretkey123}
      GCP_LOCATION: ${GCP_LOCATION:-us-west1}
      GCP_RESOURCE_ID: ${GCP_RESOURCE_ID:-2423481957292703744}
      RUNNING_ON_AZURE: ${RUNNING_ON_AZURE:-}
      IDENTITY_ENDPOINT: ${IDENTITY_ENDPOINT:-}
      IDENTITY_HEADER: ${IDENTITY_HEADER:-}
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: travelflow-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data: